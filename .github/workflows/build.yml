name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 1.21.8 requires Java 21, 26.1.2 requires Java 25.
      # We install both: loom-back-compat selects the right toolchain per version,
      # so a single "./gradlew build" builds all versions (no matrix needed).
      - name: Setup JDK 21 + 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            21
            25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build all Minecraft versions
        run: |
          chmod +x ./gradlew
          ./gradlew build --stacktrace

      - name: Upload mod jars
        uses: actions/upload-artifact@v6
        with:
          name: onlycoords-jars
          path: |
            versions/*/build/libs/*.jar
            !versions/*/build/libs/*-sources.jar
          if-no-files-found: error
