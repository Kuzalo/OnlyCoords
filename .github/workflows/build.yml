name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1.21.8 nécessite Java 21, 26.1.2 nécessite Java 25.
      # On installe les deux : loom-back-compat sélectionne le bon toolchain par version,
      # donc un unique « ./gradlew build » construit toutes les versions (pas besoin de matrix).
      - name: Setup JDK 21 + 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            21
            25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build all Minecraft versions
        run: |
          chmod +x ./gradlew
          ./gradlew build --stacktrace

      - name: Upload mod jars
        uses: actions/upload-artifact@v4
        with:
          name: onlycoords-jars
          path: |
            versions/*/build/libs/*.jar
            !versions/*/build/libs/*-sources.jar
          if-no-files-found: error
