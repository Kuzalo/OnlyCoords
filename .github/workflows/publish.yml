# ─────────────────────────────────────────────────────────────────────────────
# Automatic publishing to Modrinth / CurseForge / GitHub Releases.
# DISABLED by default (if: false) — the structure is ready for later.
#
# To enable it:
#   1. Fill in the project IDs and the repo in build.gradle.kts (publishMods block).
#   2. Create the GitHub secrets: MODRINTH_TOKEN, CURSEFORGE_TOKEN.
#      (GITHUB_TOKEN is provided automatically by GitHub Actions.)
#   3. Remove the "if: false" line below.
#   4. Publish by pushing a version tag:  git tag v1.0.0 && git push origin v1.0.0
# ─────────────────────────────────────────────────────────────────────────────
name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    if: false  # ← remove this line to enable publishing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 21 + 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            21
            25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Publish all versions
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./gradlew
          ./gradlew chiseledPublishMods --stacktrace
