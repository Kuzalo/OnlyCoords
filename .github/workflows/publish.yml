# ─────────────────────────────────────────────────────────────────────────────
# Publication automatique sur Modrinth / CurseForge / GitHub Releases.
# DÉSACTIVÉ par défaut (if: false) — la structure est prête pour plus tard.
#
# Pour l'activer :
#   1. Renseigne les project IDs et le repo dans build.gradle.kts (bloc publishMods).
#   2. Crée les secrets GitHub : MODRINTH_TOKEN, CURSEFORGE_TOKEN.
#      (GITHUB_TOKEN est fourni automatiquement par GitHub Actions.)
#   3. Supprime la ligne « if: false » ci-dessous.
#   4. Publie en poussant un tag de version :  git tag v1.0.0 && git push origin v1.0.0
# ─────────────────────────────────────────────────────────────────────────────
name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    if: false  # ← supprime cette ligne pour activer la publication
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21 + 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            21
            25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish all versions
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./gradlew
          ./gradlew chiseledPublishMods --stacktrace
